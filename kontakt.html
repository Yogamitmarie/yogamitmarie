<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kontakt | Yoga mit Marie</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f7f3ed;
  text-align: center;
}

.text-section {
  padding: 80px 20px;
}

.text-inner {
  max-width: 500px;
  margin: auto;
}

h2 {
  font-family: 'Playfair Display', serif;
}

.contact-form {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-top: 20px;
}

input, textarea {
  padding: 12px;
  border: 1px solid #ccc;
  font-family: 'Inter', sans-serif;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #A2947A;
}

.button {
  padding: 10px;
  border: 1px solid #2f2f2f;
  background: none;
  cursor: pointer;
}

.button:hover {
  background: #2f2f2f;
  color: white;
}
</style>
</head>

<body>

<section class="text-section">
  <div class="text-inner">
    <h2>Kontakt</h2>
    <p>Ich freue mich, von dir zu hören.</p>

    <form action="https://formspree.io/f/DEINE-ID" method="POST" class="contact-form">

      <input type="text" name="name" placeholder="Dein Name" required>

      <input type="email" name="email" placeholder="Deine E-Mail" required>

      <textarea name="message" rows="5" placeholder="Deine Nachricht" required></textarea>

      <button type="submit" class="button">Nachricht senden</button>

    </form>
  </div>
</section>

</body>
</html>
